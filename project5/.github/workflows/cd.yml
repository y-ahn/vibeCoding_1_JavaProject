name: CD — Deploy to Production

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: JDK 21 설정
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Gradle 빌드
        run: |
          chmod +x gradlew
          ./gradlew bootJar -x test

      # 1. Docker Hub 로그인
      - name: Docker Hub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 2. Docker 이미지 빌드 & 푸시
      - name: Docker 이미지 빌드 & 푸시
        run: |
          docker build -t \
            ${{ secrets.DOCKERHUB_USERNAME }}/shop-api:latest \
            -t \
            ${{ secrets.DOCKERHUB_USERNAME }}/shop-api:${{ github.sha }} \
            .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/shop-api:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/shop-api:${{ github.sha }}

      # 3. EC2(또는 Railway)에 배포
      - name: EC2 SSH 배포
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/shop-api:latest
            docker stop shop-api || true
            docker rm shop-api || true
            docker run -d \
              --name shop-api \
              -p 8080:8080 \
              -e SPRING_PROFILES_ACTIVE=prod \
              -e JWT_SECRET=${{ secrets.JWT_SECRET }} \
              -e DB_URL=${{ secrets.DB_URL }} \
              -e PORTONE_API_KEY=${{ secrets.PORTONE_API_KEY }} \
              ${{ secrets.DOCKERHUB_USERNAME }}/shop-api:latest

      # 4. 헬스체크
      - name: 헬스체크
        run: |
          sleep 15
          curl -f http://${{ secrets.SERVER_HOST }}:8080/actuator/health || exit 1

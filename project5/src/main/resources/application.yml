spring:
  profiles:
    active: dev
  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: ${JWT_SECRET:dev-secret-key-must-be-at-least-32-characters-long!}
  access-token-expiry: 1800000
  refresh-token-expiry: 604800000

portone:
  api-url: https://api.iamport.kr
  imp-key: ${PORTONE_IMP_KEY:test_imp_key}
  imp-secret: ${PORTONE_IMP_SECRET:test_imp_secret}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs
